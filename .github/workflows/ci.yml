name: MarketMind-Pro CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Security & Unit Tests
    runs-on: ubuntu-latest  # GitHub Actions doesn't have arm64 yet; x86 for CI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Black format check
        run: black --check src/ tests/

      - name: Bandit security scan
        run: bandit -r src/ -ll

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://marketmind:test@localhost:5432/marketmind_test
          REDIS_URL: redis://localhost:6379/0
          TELEGRAM_TOKEN: test_token
          TELEGRAM_CHAT_ID: "12345"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketmind_test
          POSTGRES_USER: marketmind
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head
        env:
          DATABASE_URL_SYNC: postgresql+psycopg2://marketmind:test@localhost:5432/marketmind_test

      - name: Run integration tests
        run: pytest tests/integration/ -v -m integration
        env:
          DATABASE_URL: postgresql+asyncpg://marketmind:test@localhost:5432/marketmind_test
          DATABASE_URL_SYNC: postgresql+psycopg2://marketmind:test@localhost:5432/marketmind_test
          REDIS_URL: redis://localhost:6379/0
          TELEGRAM_TOKEN: test_token
          TELEGRAM_CHAT_ID: "12345"

  docker-build:
    name: Docker Build (arm64)
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: false
          tags: marketmind-pro:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
